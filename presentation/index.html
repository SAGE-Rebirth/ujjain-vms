<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Ujjain VMS — The Offline-First Entry Layer for Simhastha 2028</title>
<style>
/* ============================================================
   UJJAIN VMS — Pitch Deck
   Self-contained, zero-dependency, runs fully offline.
   Theme: saffron (#f97316) + deep indigo (#312e81) + mandala.
   ============================================================ */

:root{
  --saffron:#f97316;
  --saffron-deep:#ea580c;
  --gold:#fbbf24;
  --indigo:#312e81;
  --indigo-deep:#1e1b4b;
  --ink:#0b1020;
  --cream:#fff7ed;
  --paper:#fffaf3;
  --rose:#e11d48;
  --emerald:#10b981;
  --slate:#94a3b8;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Inter Variable',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--indigo-deep);
  color:#0b1020;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
h1,h2,h3{font-weight:800;letter-spacing:-.02em;line-height:1.05;}
.serif{font-family:Georgia,'Times New Roman',serif;}

/* ---------- Deck shell ---------- */
#deck{position:fixed;inset:0;}
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(28px,5vw,90px);
  padding-bottom:clamp(78px,9vh,112px);
  opacity:0;visibility:hidden;
  transform:translate3d(0,22px,0);
  transition:opacity .5s cubic-bezier(.22,.61,.36,1), transform .5s cubic-bezier(.22,.61,.36,1);
  background:
    radial-gradient(1200px 700px at 80% -10%, rgba(249,115,22,.16), transparent 60%),
    radial-gradient(900px 600px at 0% 110%, rgba(99,102,241,.22), transparent 60%),
    linear-gradient(160deg,#fffaf3 0%, #fff2e0 55%, #ffe9d3 100%);
  overflow:hidden;
}
.slide.dark{
  background:
    radial-gradient(1000px 700px at 78% -8%, rgba(251,191,36,.20), transparent 58%),
    radial-gradient(900px 700px at -5% 108%, rgba(99,102,241,.30), transparent 60%),
    linear-gradient(160deg,#1e1b4b 0%, #312e81 60%, #3b0764 100%);
  color:#fff7ed;
}
.slide.active{opacity:1;visibility:visible;transform:none;z-index:2;}
.slide.prev{transform:translate3d(0,-22px,0);}

/* ---------- Mandala / yantra (inline SVG, rasterised once → composited, no per-frame repaint) ---------- */
.mandala{
  position:absolute;pointer-events:none;opacity:.12;color:var(--saffron);
  will-change:transform;transform:translateZ(0);
  animation:spin 120s linear infinite;
}
.mandala svg{display:block;width:100%;height:100%;}
.mandala.m1{width:min(58vw,640px);aspect-ratio:1;top:-16%;right:-12%;color:var(--saffron);}
.mandala.m2{width:min(46vw,500px);aspect-ratio:1;bottom:-18%;left:-12%;color:var(--indigo);
  animation-direction:reverse;animation-duration:160s;}
.dark .mandala{opacity:.15;}
.dark .mandala.m1{color:var(--gold);}
.dark .mandala.m2{color:#a5b4fc;}
@keyframes spin{to{transform:rotate(360deg);}}

/* floating diya embers — transform-only, GPU composited */
.diya{position:absolute;width:7px;height:7px;border-radius:50%;
  background:radial-gradient(circle,#fff,#fbbf24 40%,transparent 70%);
  box-shadow:0 0 16px 5px rgba(251,191,36,.5);
  will-change:transform,opacity;
  animation:floaty 8s ease-in-out infinite;pointer-events:none;opacity:.85;}
@keyframes floaty{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(0,-24px,0)}}

@media (prefers-reduced-motion: reduce){
  .mandala,.diya,.dot,.live-dot{animation:none!important;}
  .slide{transition:opacity .25s ease;}
  *{scroll-behavior:auto!important;}
}

/* ---------- Reusable bits ---------- */
.kicker{
  display:inline-flex;align-items:center;gap:8px;
  font-size:clamp(11px,1.1vw,14px);font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--saffron-deep);background:rgba(249,115,22,.12);
  padding:7px 16px;border-radius:999px;border:1px solid rgba(249,115,22,.30);
}
.dark .kicker{color:var(--gold);background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.30);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--saffron);animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.title{font-size:clamp(34px,6.2vw,84px);}
.subtitle{font-size:clamp(16px,2.2vw,26px);font-weight:500;opacity:.85;max-width:18ch;}
.lead{font-size:clamp(16px,1.8vw,22px);line-height:1.5;max-width:60ch;opacity:.92;}
.center{text-align:center;align-items:center;}
.wrap{width:min(1180px,100%);position:relative;z-index:3;}

.grid{display:grid;gap:clamp(14px,1.6vw,22px);width:100%;}
.g2{grid-template-columns:repeat(2,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g4{grid-template-columns:repeat(4,1fr);}
@media(max-width:880px){.g2,.g3,.g4{grid-template-columns:1fr;}}

.card{
  background:rgba(255,255,255,.82);border:1px solid rgba(49,46,129,.12);
  border-radius:18px;padding:clamp(16px,1.8vw,26px);
  box-shadow:0 10px 30px -18px rgba(30,27,75,.4);
  transition:transform .32s cubic-bezier(.22,.61,.36,1), box-shadow .32s, border-color .32s;
}
.card:hover{transform:translateY(-5px);box-shadow:0 22px 44px -22px rgba(249,115,22,.55);border-color:rgba(249,115,22,.4);}
.dark .card{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);}
.card h3{font-size:clamp(17px,1.7vw,22px);margin-bottom:8px;}
.card p{font-size:clamp(13px,1.25vw,16px);opacity:.82;line-height:1.5;}
.card .ico{font-size:30px;margin-bottom:6px;display:block;}

.pill{display:inline-block;font-size:13px;font-weight:700;padding:4px 12px;border-radius:999px;
  background:rgba(16,185,129,.15);color:#047857;border:1px solid rgba(16,185,129,.3);}
.pill.rose{background:rgba(225,29,72,.14);color:#be123c;border-color:rgba(225,29,72,.3);}
.pill.gold{background:rgba(251,191,36,.18);color:#b45309;border-color:rgba(251,191,36,.4);}

/* ---------- Navigation ---------- */
#progress{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,var(--saffron),var(--gold));z-index:50;
  width:0;transition:width .5s cubic-bezier(.22,.61,.36,1);box-shadow:0 0 12px rgba(251,191,36,.7);}
#dots{position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:10px;}
#dots button{width:11px;height:11px;border-radius:50%;border:2px solid rgba(120,120,140,.5);background:transparent;cursor:pointer;padding:0;transition:.25s;}
#dots button.on{background:var(--saffron);border-color:var(--saffron);transform:scale(1.3);box-shadow:0 0 10px rgba(249,115,22,.8);}
.nav-arrows{position:fixed;bottom:20px;right:22px;z-index:50;display:flex;gap:10px;}
.nav-arrows button{
  width:46px;height:46px;border-radius:14px;border:none;cursor:pointer;font-size:20px;
  background:rgba(49,46,129,.9);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 20px -8px rgba(0,0,0,.6);transition:.2s;}
.nav-arrows button:hover{background:var(--saffron);transform:translateY(-2px);}
.nav-arrows button:disabled{opacity:.3;cursor:default;transform:none;}
#counter{position:fixed;bottom:26px;left:24px;z-index:50;white-space:nowrap;
  font-size:12.5px;font-weight:700;color:rgba(90,90,110,.9);letter-spacing:.06em;
  padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.5);border:1px solid rgba(120,120,140,.18);backdrop-filter:blur(6px);}
.hint{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:50;white-space:nowrap;
  font-size:12px;font-weight:600;color:rgba(90,90,110,.8);letter-spacing:.04em;
  padding:6px 14px;border-radius:999px;background:rgba(255,255,255,.5);border:1px solid rgba(120,120,140,.18);backdrop-filter:blur(6px);}
/* hide the centre hint before it can ever reach the counter / arrows */
@media(max-width:880px){.hint{display:none;}}
.dark ~ * {}

/* ---------- Stats / counters ---------- */
.stat{text-align:center;}
.stat .num{font-size:clamp(34px,5vw,64px);font-weight:800;line-height:1;
  background:linear-gradient(120deg,var(--saffron),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;}
.dark .stat .num{background:linear-gradient(120deg,var(--gold),#fff);-webkit-background-clip:text;background-clip:text;color:transparent;}
.stat .lbl{font-size:clamp(12px,1.2vw,15px);font-weight:600;opacity:.8;margin-top:8px;}

/* ---------- Architecture diagram ---------- */
.arch{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;}
.node-box{border:1.5px solid;border-radius:14px;padding:14px 18px;font-weight:600;text-align:center;position:relative;background:rgba(255,255,255,.06);}
.cloud{border-color:var(--gold);color:var(--gold);min-width:280px;box-shadow:0 0 30px -6px rgba(251,191,36,.4);}
.row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.cp{border-color:#a5b4fc;color:#c7d2fe;min-width:150px;font-size:14px;}
.syncline{width:2px;height:30px;background:linear-gradient(#fbbf24,transparent);position:relative;overflow:visible;}
.syncline::after{content:'';position:absolute;left:-2px;width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:flow 2.2s linear infinite;}
@keyframes flow{0%{top:0;opacity:1}100%{top:30px;opacity:0}}

/* ---------- Live demo widget ---------- */
.demo{display:flex;flex-direction:column;gap:14px;align-items:stretch;}
.demo-screen{
  border-radius:18px;padding:24px;text-align:center;font-weight:800;
  font-size:clamp(28px,4vw,46px);letter-spacing:.04em;transition:.4s;
  border:2px solid;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
}
.demo-screen small{font-size:14px;font-weight:600;letter-spacing:.04em;opacity:.85;}
.scr-idle{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.18);color:#cbd5e1;}
.scr-admit{background:rgba(16,185,129,.18);border-color:var(--emerald);color:#6ee7b7;box-shadow:0 0 40px -8px rgba(16,185,129,.6);}
.scr-deny{background:rgba(225,29,72,.18);border-color:var(--rose);color:#fda4af;box-shadow:0 0 40px -8px rgba(225,29,72,.6);}
.controls{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn{border:none;cursor:pointer;font-weight:700;font-size:15px;padding:13px 22px;border-radius:13px;transition:.2s;color:#fff;}
.btn:hover{transform:translateY(-2px);}
.btn-scan{background:linear-gradient(120deg,var(--saffron),var(--saffron-deep));}
.btn-net{background:#475569;}
.btn-net.off{background:#7f1d1d;}
.btn-lock{background:linear-gradient(120deg,#be123c,#881337);}
.btn-reset{background:rgba(255,255,255,.16);}
.netbadge{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:14px;padding:7px 15px;border-radius:999px;}
.net-on{background:rgba(16,185,129,.18);color:#6ee7b7;}
.net-off{background:rgba(225,29,72,.2);color:#fda4af;}

/* ---------- Capacity bars ---------- */
.zonebar{display:flex;align-items:center;gap:12px;margin:7px 0;}
.zonebar .nm{width:130px;font-size:13px;font-weight:600;text-align:right;opacity:.85;}
.track{flex:1;height:18px;border-radius:999px;background:rgba(120,120,140,.2);overflow:hidden;}
.fill{height:100%;border-radius:999px;width:0;transition:width 1.4s cubic-bezier(.22,.61,.36,1);
  background:linear-gradient(90deg,var(--saffron),var(--gold));}
.fill.hot{background:linear-gradient(90deg,#e11d48,#f97316);}
.zonebar .pc{width:46px;font-size:13px;font-weight:700;text-align:left;}

/* ---------- Revenue calculator ---------- */
.calc{display:grid;grid-template-columns:1.1fr .9fr;gap:26px;align-items:center;}
@media(max-width:880px){.calc{grid-template-columns:1fr;}}
.slider-row{margin:18px 0;}
.slider-row label{display:flex;justify-content:space-between;font-weight:700;font-size:15px;margin-bottom:8px;}
.slider-row label b{color:var(--gold);}
input[type=range]{width:100%;-webkit-appearance:none;height:7px;border-radius:999px;background:rgba(255,255,255,.18);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;
  background:linear-gradient(120deg,var(--saffron),var(--gold));cursor:pointer;box-shadow:0 0 14px rgba(251,191,36,.7);border:2px solid #fff;}
/* --- gamified kalash output --- */
.gamebox{display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;
  padding:20px 18px 16px;border-radius:26px;
  background:radial-gradient(120% 90% at 50% 22%,rgba(20,16,48,.72),rgba(20,16,48,.42) 72%,rgba(20,16,48,0));
  box-shadow:inset 0 0 0 1px rgba(251,191,36,.14);}
.odometer{font-size:clamp(40px,6.4vw,74px);font-weight:800;line-height:1;letter-spacing:-.01em;
  font-variant-numeric:tabular-nums;
  background:linear-gradient(120deg,var(--gold),#fff 55%,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 2px 16px rgba(251,191,36,.5));transition:transform .14s cubic-bezier(.34,1.56,.64,1);}
.odometer.bump{transform:scale(1.09);}
.odo-cap{font-size:12.5px;opacity:.78;font-weight:600;margin-top:-2px;text-align:center;}

.kalash{position:relative;width:160px;height:206px;margin:2px 0;}
.kalash-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:2;
  filter:drop-shadow(0 15px 20px rgba(120,53,15,.42));}
.kalash-glow{position:absolute;left:50%;top:57%;width:165%;height:150%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:0;border-radius:50%;
  background:radial-gradient(closest-side,rgba(251,191,36,.42),transparent 70%);opacity:.5;transition:opacity .6s;}
.kalash.full .kalash-glow{opacity:1;animation:pulse 1.9s ease-in-out infinite;}
/* molten gold level — a smooth group translate, never a reflowing height */
.k-liquid{transition:transform .72s cubic-bezier(.22,.61,.36,1);will-change:transform;}
.wl{will-change:transform;}
.wl-front{animation:wlx 2.7s linear infinite;}
.wl-back{animation:wlx 4.1s linear infinite reverse;}
@keyframes wlx{from{transform:translateX(0)}to{transform:translateX(-40px)}}
.kalash-pct{position:absolute;left:50%;top:61%;transform:translate(-50%,-50%);z-index:3;pointer-events:none;
  font-weight:800;font-size:21px;color:#fff7e6;letter-spacing:.01em;
  text-shadow:0 1px 2px rgba(92,40,6,.95),0 0 9px rgba(120,53,15,.85);}
/* CSS-drawn gold coin — consistent colour, perfectly round, no emoji-font variance */
.coin{position:absolute;width:17px;height:17px;border-radius:50%;pointer-events:none;z-index:5;
  background:radial-gradient(circle at 34% 28%, #fffbeb 0%, #fde047 36%, #f59e0b 72%, #b45309 100%);
  border:1px solid #d97706;
  box-shadow:0 0 10px rgba(251,191,36,.7), inset 0 -2px 3px rgba(146,64,14,.6), inset 0 2px 2px rgba(255,255,255,.55);
  transform-origin:center;will-change:transform,opacity;
  animation:coinUp 1.05s cubic-bezier(.33,0,.4,1) forwards;}
.coin::before{content:'';position:absolute;inset:3px;border-radius:50%;border:1px solid rgba(146,64,14,.45);}
@keyframes coinUp{
  0%  {opacity:0;transform:translate3d(0,6px,0)   scale(.45)}
  18% {opacity:1;transform:translate3d(0,-14px,0) scale(1)}
  100%{opacity:0;transform:translate3d(0,-94px,0) scale(.92)}
}

.miles{display:flex;gap:5px;justify-content:center;width:100%;}
.mile{flex:1;min-width:0;text-align:center;opacity:.38;transition:.45s;filter:grayscale(.85);}
.mile.lit{opacity:1;filter:none;transform:translateY(-3px);}
.mile .lamp{font-size:20px;line-height:1;display:block;}
.mile.lit .lamp{filter:drop-shadow(0 0 9px rgba(251,191,36,.95));animation:flicker 1.5s infinite;}
@keyframes flicker{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.84;transform:scale(.93)}}
.mile .ml{font-size:11px;font-weight:800;display:block;margin-top:1px;color:var(--gold);}
.mile.lit .ml{color:var(--gold);}
.mile:not(.lit) .ml{color:#cbd5e1;}
.mile .mc{font-size:9.5px;opacity:.72;display:block;line-height:1.15;}

.impact-live{font-size:14px;font-weight:600;text-align:left;background:rgba(255,255,255,.06);
  border:1px solid rgba(251,191,36,.3);border-radius:13px;padding:12px 15px;margin-top:18px;line-height:1.5;}
.impact-live b{color:var(--gold);}

.streams{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(max-width:880px){.streams{grid-template-columns:1fr;}}
.stream{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);border-radius:14px;padding:14px 16px;}
.stream b{color:var(--gold);font-size:15px;}
.stream span{display:block;font-size:13px;opacity:.78;margin-top:4px;line-height:1.45;}

ul.clean{list-style:none;display:flex;flex-direction:column;gap:12px;}
ul.clean li{display:flex;gap:12px;font-size:clamp(14px,1.5vw,18px);line-height:1.45;align-items:flex-start;}
ul.clean li::before{content:'';flex:none;width:10px;height:10px;border-radius:50%;margin-top:7px;
  background:linear-gradient(120deg,var(--saffron),var(--gold));box-shadow:0 0 8px rgba(249,115,22,.6);}

.flow-steps{display:flex;align-items:stretch;gap:0;flex-wrap:wrap;justify-content:center;}
.step{flex:1;min-width:140px;text-align:center;padding:18px 12px;position:relative;}
.step .n{width:42px;height:42px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
  font-weight:800;color:#fff;background:linear-gradient(120deg,var(--saffron),var(--saffron-deep));box-shadow:0 8px 18px -8px rgba(249,115,22,.7);}
.step .t{font-weight:700;font-size:15px;margin-bottom:4px;}
.step .d{font-size:12.5px;opacity:.75;}
.step:not(:last-child)::after{content:'→';position:absolute;right:-8px;top:32px;color:var(--saffron);font-size:22px;font-weight:800;}
@media(max-width:880px){.step:not(:last-child)::after{display:none;}}

.fade{opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s;}
.slide.active .fade{opacity:1;transform:none;}
.slide.active .fade.d1{transition-delay:.12s}
.slide.active .fade.d2{transition-delay:.24s}
.slide.active .fade.d3{transition-delay:.36s}
.slide.active .fade.d4{transition-delay:.48s}
.slide.active .fade.d5{transition-delay:.6s}

.quote{font-family:Georgia,serif;font-style:italic;font-size:clamp(20px,3vw,34px);line-height:1.4;max-width:24ch;}
.author{font-size:14px;font-weight:700;opacity:.7;letter-spacing:.05em;text-transform:uppercase;margin-top:18px;}

.badge-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.tag{font-size:12.5px;font-weight:700;padding:7px 14px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);}
.dark .tag{color:#e0e7ff;}

/* ============ Animated demand-spike chart (slide: The Problem) ============ */
/* Single clip-path wipe reveals the whole chart left-to-right — never a half state. */
.dchart{width:100%;max-width:780px;margin:0 auto 24px;}
.dchart svg{width:100%;height:auto;display:block;overflow:visible;
  clip-path:inset(0 100% 0 0);transition:clip-path 1.3s cubic-bezier(.4,0,.2,1);}
.dchart.draw svg{clip-path:inset(0 -3% 0 0);}
.dline{fill:none;stroke:var(--saffron);stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round;}
.darea{fill:url(#dgrad);}
.dceil{stroke:var(--rose);stroke-width:2;stroke-dasharray:6 6;opacity:.65;}
.dband{fill:rgba(225,29,72,.13);}
.dmark>circle{fill:var(--rose);}
.dmark .ping{fill:none;stroke:var(--rose);stroke-width:2;transform-box:fill-box;transform-origin:center;
  animation:ping 1.9s ease-out 1.1s 4;}
@keyframes ping{0%{transform:scale(.5);opacity:.85}100%{transform:scale(1.8);opacity:0}}
.dlabel{font:700 13px 'Inter Variable',sans-serif;fill:#be123c;}
.dcap{font:700 12px 'Inter Variable',sans-serif;fill:#be123c;opacity:.85;}
.daxis{font:600 11px 'Inter Variable',sans-serif;fill:#94a3b8;}

/* ============ Animated TAM bar chart (slide: The Bigger Market) ============ */
.tam{width:min(840px,100%);margin:8px auto 0;display:flex;flex-direction:column;gap:11px;text-align:left;}
.tam-row{display:grid;grid-template-columns:182px 1fr 78px;align-items:center;gap:14px;}
.tam-lbl{font-size:13.5px;font-weight:700;text-align:right;opacity:.9;line-height:1.2;}
.tam-lbl small{font-weight:600;opacity:.6;}
.tam-track{height:24px;border-radius:9px;background:rgba(49,46,129,.1);overflow:hidden;}
.tam-bar{height:100%;width:0;border-radius:9px;background:linear-gradient(90deg,var(--saffron),var(--gold));
  box-shadow:0 0 16px -3px rgba(249,115,22,.5);transition:width 1.1s cubic-bezier(.22,.61,.36,1);}

<script>
/* ============================================================
   Deck engine
   ============================================================ */
(function(){
  const deck = document.getElementById('deck');
  const tpl  = document.getElementById('slides').innerHTML;
  deck.innerHTML = tpl;
  const slides = Array.from(deck.querySelectorAll('.slide'));
  const dotsWrap = document.getElementById('dots');
  const counter = document.getElementById('counter');
  const prog = document.getElementById('progress');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');
  let cur = 0;

  // Build one crisp yantra SVG, drop it into every .mandala. Rasterised once by the
  // browser, then only the layer's transform is animated → GPU-composited, no repaint.
  function yantra(){
    const p=[];
    p.push('<circle cx=100 cy=100 r=97/>','<circle cx=100 cy=100 r=82/>','<circle cx=100 cy=100 r=46/>');
    p.push('<circle cx=100 cy=100 r=3.5 fill=currentColor stroke=none/>');
    for(let i=0;i<24;i++){const a=i*Math.PI/12;
      p.push('<line x1='+(100+46*Math.cos(a)).toFixed(1)+' y1='+(100+46*Math.sin(a)).toFixed(1)+' x2='+(100+82*Math.cos(a)).toFixed(1)+' y2='+(100+82*Math.sin(a)).toFixed(1)+'/>');}
    for(let i=0;i<12;i++){const a=i*Math.PI/6;
      p.push('<circle cx='+(100+70*Math.cos(a)).toFixed(1)+' cy='+(100+70*Math.sin(a)).toFixed(1)+' r=2.6/>');}
    for(let i=0;i<8;i++){const a=i*Math.PI/4;
      const x1=(100+12*Math.cos(a)).toFixed(1),y1=(100+12*Math.sin(a)).toFixed(1);
      const x2=(100+40*Math.cos(a)).toFixed(1),y2=(100+40*Math.sin(a)).toFixed(1);
      const c1x=(100+27*Math.cos(a+.34)).toFixed(1),c1y=(100+27*Math.sin(a+.34)).toFixed(1);
      const c2x=(100+27*Math.cos(a-.34)).toFixed(1),c2y=(100+27*Math.sin(a-.34)).toFixed(1);
      p.push('<path d="M'+x1+' '+y1+' Q'+c1x+' '+c1y+' '+x2+' '+y2+' Q'+c2x+' '+c2y+' '+x1+' '+y1+' Z"/>');}
    return '<svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">'+p.join('')+'</svg>';
  }
  const YANTRA=yantra();
  document.querySelectorAll('.mandala').forEach(m=>m.innerHTML=YANTRA);

  // sprinkle diya embers on dark slides (transform-only animation)
  slides.forEach(s=>{
    if(s.classList.contains('dark')){
      for(let i=0;i<5;i++){
        const d=document.createElement('span');
        d.className='diya';
        d.style.left=(8+Math.random()*84)+'%';
        d.style.top=(12+Math.random()*76)+'%';
        d.style.animationDelay=(Math.random()*6)+'s';
        d.style.animationDuration=(6+Math.random()*4)+'s';
        s.appendChild(d);
      }
    }
  });

  // dots
  slides.forEach((s,i)=>{
    const b=document.createElement('button');
    b.title=s.dataset.name||('Slide '+(i+1));
    b.addEventListener('click',()=>go(i));
    dotsWrap.appendChild(b);
  });
  const dots = Array.from(dotsWrap.children);

  function go(i){
    i=Math.max(0,Math.min(slides.length-1,i));
    slides.forEach((s,k)=>{
      s.classList.toggle('active',k===i);
      s.classList.toggle('prev',k<i);
    });
    dots.forEach((d,k)=>d.classList.toggle('on',k===i));
    counter.textContent=String(i+1).padStart(2,'0')+' / '+String(slides.length).padStart(2,'0');
    prog.style.width=((i)/(slides.length-1)*100)+'%';
    prevBtn.disabled=i===0; nextBtn.disabled=i===slides.length-1;
    cur=i;
    if(('#'+(i+1))!==location.hash){ history.replaceState(null,'','#'+(i+1)); }
    onEnter(slides[i]);
  }
  const next=()=>go(cur+1), prev=()=>go(cur-1);
  nextBtn.onclick=next; prevBtn.onclick=prev;

  document.addEventListener('keydown',e=>{
    if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){e.preventDefault();next();}
    else if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();prev();}
    else if(e.key==='Home')go(0);
    else if(e.key==='End')go(slides.length-1);
  });
  // swipe
  let tx=0;
  deck.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
  deck.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?next():prev();}});

  /* ---- per-slide enter animations ---- */
  function onEnter(s){
    const name=s.dataset.name;
    if(name==='Live Capacity'){
      s.querySelectorAll('.fill').forEach(f=>{
        const pc=+f.dataset.pc; f.style.width='0';
        requestAnimationFrame(()=>{ setTimeout(()=>{ f.style.width=pc+'%'; f.classList.toggle('hot',pc>=90); },120); });
      });
    }
    if(name==='Impact'){
      s.querySelectorAll('.num').forEach(n=>countUp(n));
    }
    if(name==='The Problem'){ const c=document.getElementById('demandChart'); if(c){c.classList.remove('draw');void c.offsetWidth;c.classList.add('draw');} }
    if(name==='The Bigger Market'){ const t=document.getElementById('tamChart'); if(t){ t.querySelectorAll('.tam-bar').forEach(b=>{b.style.width='0';}); requestAnimationFrame(()=>setTimeout(()=>{ t.querySelectorAll('.tam-bar').forEach((b,i)=>{ setTimeout(()=>{b.style.width=b.dataset.w+'%';}, i*110); }); },80)); } }
    if(name==='Business & Revenue'){ resetGame(); calc(true); }
    if(name==='Where We Fit'){ const f=document.getElementById('zrFill'); if(f){f.style.width='0';} requestAnimationFrame(()=>selectZone(zrSel)); }
    if(name==='Architecture'){ resetArch(); }
    if(name==='Booking Flow'){ stopBkPlay(); if(window._bkSetStep)_bkSetStep(0); }
  }
  function countUp(el){
    const to=parseFloat(el.dataset.to), suf=el.dataset.suffix||'';
    const dec=(to%1!==0)?1:0; const dur=1100; const t0=performance.now();
    function tick(t){
      const p=Math.min(1,(t-t0)/dur); const e=1-Math.pow(1-p,3);
      el.textContent=(to*e).toFixed(dec)+suf;
      if(p<1)requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  /* ---- Live offline checkpoint demo ---- */
  let online=true, locked=false;
  const scr=()=>document.getElementById('demoScreen');
  const netBadge=()=>document.getElementById('netBadge');
  function setScreen(state,big,small){
    const el=scr(); if(!el)return;
    el.className='demo-screen '+state;
    el.innerHTML=big+'<small>'+small+'</small>';
  }
  function bind(){
    const bScan=document.getElementById('bScan');
    const bNet=document.getElementById('bNet');
    const bLock=document.getElementById('bLock');
    const bReset=document.getElementById('bReset');
    if(!bScan||bScan._bound)return; bScan._bound=true;

    bScan.onclick=()=>{
      if(locked){ setScreen('scr-deny','⛔ DENIED','LOCKDOWN active · all passes revoked'+(online?'':' · verified OFFLINE')); return; }
      setScreen('scr-idle','⏳ VERIFYING','checking Ed25519 signature on-device…');
      setTimeout(()=>{
        setScreen('scr-admit','✅ ADMIT', (online?'signature valid · MP09-CX-4412':'signature valid · verified with NO network ('+'soft-green)') );
      },520);
    };
    bNet.onclick=()=>{
      online=!online;
      bNet.classList.toggle('off',!online);
      bNet.textContent=online?'📴 Cut network':'🌐 Restore network';
      const nb=netBadge();
      nb.className='netbadge '+(online?'net-on':'net-off');
      nb.textContent=online?'🟢 NETWORK: ONLINE':'🔴 NETWORK: OFFLINE';
      if(online && document.querySelector('.scr-deny') && !locked){}
    };
    bLock.onclick=()=>{
      locked=!locked;
      bLock.textContent=locked?'🔓 Lift lockdown':'🛑 Lockdown';
      if(locked) setScreen('scr-deny','🛑 LOCKDOWN','all bookings revoked'+(online?'':' · propagated even OFFLINE'));
      else setScreen('scr-idle','READY','Indore Rd · Gate 1 · awaiting scan');
    };
    bReset.onclick=()=>{
      locked=false; online=true;
      bLock.textContent='🛑 Lockdown';
      bNet.textContent='📴 Cut network'; bNet.classList.remove('off');
      const nb=netBadge(); nb.className='netbadge net-on'; nb.textContent='🟢 NETWORK: ONLINE';
      setScreen('scr-idle','READY','Indore Rd · Gate 1 · awaiting scan');
    };
  }

  /* ---- Gamified revenue calculator (the kalash that fills with gold) ---- */
  const KALASH_FULL = 2.5e9;            // ₹250 Cr fills the pot to the brim
  // surface position in SVG user units: empty (pct 0) sits at the base, full at the rim
  function liquidY(pct){ return 46 + (1 - Math.max(0,Math.min(100,pct))/100) * 150; }
  function fmtCr(rupees){
    if(rupees>=1e7){ const cr=rupees/1e7; return '₹'+(cr>=100?Math.round(cr):cr.toFixed(cr>=10?0:1))+' Cr'; }
    if(rupees>=1e5) return '₹'+(rupees/1e5).toFixed(1)+' L';
    return '₹'+Math.round(rupees).toLocaleString('en-IN');
  }
  function fmtIN(n){return n.toLocaleString('en-IN');}

  // odometer that eases toward its target so dragging feels like rolling cash
  let odoCur=0, odoTarget=0, odoRAF=null;
  function rollTo(val){
    odoTarget=val;
    if(odoRAF)return;
    const el=document.getElementById('revOut');
    const tick=()=>{
      const diff=odoTarget-odoCur;
      if(Math.abs(diff)<odoTarget*0.004+1){ odoCur=odoTarget; el.textContent=fmtCr(odoCur); odoRAF=null; return; }
      odoCur+=diff*0.18;
      el.textContent=fmtCr(odoCur);
      odoRAF=requestAnimationFrame(tick);
    };
    odoRAF=requestAnimationFrame(tick);
  }

  let litSet=new Set();
  function resetGame(){
    litSet=new Set();
    odoCur=0; if(odoRAF){cancelAnimationFrame(odoRAF);odoRAF=null;}
    const liq=document.getElementById('liquid'); if(liq)liq.style.transform='translateY('+liquidY(0)+'px)';
    document.querySelectorAll('.mile').forEach(m=>m.classList.remove('lit'));
    const k=document.getElementById('kalash'); if(k)k.classList.remove('full');
  }
  function burstCoins(n){
    const k=document.getElementById('kalash'); if(!k)return;
    for(let i=0;i<n;i++){
      const c=document.createElement('span');
      c.className='coin';
      const sz=(13+Math.random()*6).toFixed(1);
      c.style.width=c.style.height=sz+'px';
      // fountain up out of the vessel mouth (kalash 160px wide, mouth at top-centre)
      c.style.left=(80 + (i-(n-1)/2)*11 + (Math.random()*6-3) - 7)+'px';
      c.style.bottom=(150+Math.random()*16)+'px';
      c.style.animationDelay=(i*0.05+Math.random()*0.05).toFixed(3)+'s';
      k.appendChild(c);
      setTimeout(()=>c.remove(),1250);
    }
  }
  function calc(replay){
    const v=document.getElementById('sVol'), f=document.getElementById('sFee'), d=document.getElementById('sDays');
    if(!v)return;
    const vol=+v.value, fee=+f.value, days=+d.value;
    const rev=vol*fee*days;
    document.getElementById('vOut').textContent=fmtIN(vol);
    document.getElementById('fOut').textContent='₹'+fee;
    document.getElementById('dOut').textContent=days;

    // odometer
    if(replay){ odoCur=0; rollTo(rev); } else rollTo(rev);
    const odo=document.getElementById('revOut');
    odo.classList.add('bump'); setTimeout(()=>odo.classList.remove('bump'),150);

    // kalash fill
    const pct=Math.min(100, rev/KALASH_FULL*100);
    const liq=document.getElementById('liquid');
    if(replay){ liq.style.transform='translateY('+liquidY(0)+'px)'; requestAnimationFrame(()=>setTimeout(()=>liq.style.transform='translateY('+liquidY(pct)+'px)',140)); }
    else liq.style.transform='translateY('+liquidY(pct)+'px)';
    document.getElementById('kalashPct').textContent=Math.round(pct)+'%';
    document.getElementById('kalash').classList.toggle('full', pct>=100);

    // milestone diyas — ignite newly-crossed ones with a coin burst
    document.querySelectorAll('.mile').forEach(m=>{
      const at=+m.dataset.at, on=rev>=at;
      m.classList.toggle('lit',on);
      if(on && !litSet.has(at) && !replay){ litSet.add(at); burstCoins(7); }
      else if(on){ litSet.add(at); }
      else litSet.delete(at);
    });

    // live "what this funds" readout (₹1 Cr ≈ one full 7-zone, multi-gate deployment cycle)
    const deployments=Math.max(0,Math.floor(rev/1e7));
    const pilots=(rev/2e7); // Phase-1 pilot ≈ ₹2 Cr
    document.getElementById('impactLive').innerHTML=
      '🪔 Self-funds <b>'+deployments.toLocaleString('en-IN')+'</b> complete 7-zone checkpoint deployments — '+
      'roughly <b>'+(pilots>=10?Math.round(pilots):pilots.toFixed(1))+'×</b> the entire Phase-1 pilot, at <b>zero</b> cost to the devotee.';
  }
  function bindCalc(){
    ['sVol','sFee','sDays'].forEach(id=>{
      const el=document.getElementById(id);
      if(el && !el._b){el._b=true; el.addEventListener('input',()=>calc(false));}
    });
    calc(false);
  }

  /* ---- Interactive: 7-zone yantra ring (Where We Fit) ---- */
  let zrSel=0;
  function initZoneRing(){
    const ring=document.getElementById('zrRing'); if(!ring||ring._init)return; ring._init=true;
    const nodes=Array.from(ring.querySelectorAll('.zr-node'));
    const spokes=document.getElementById('zrSpokes');
    const N=nodes.length, R=42; let lines='';
    nodes.forEach((n,i)=>{
      const a=(-90+i*360/N)*Math.PI/180;
      const x=50+R*Math.cos(a), y=50+R*Math.sin(a);
      n.style.left=x+'%'; n.style.top=y+'%';
      lines+='<line x1="50" y1="50" x2="'+x.toFixed(2)+'" y2="'+y.toFixed(2)+'" data-i="'+i+'"/>';
      n.addEventListener('click',()=>selectZone(i));
      n.addEventListener('mouseenter',()=>selectZone(i));
    });
    spokes.innerHTML=lines;
    selectZone(0);
  }
  function selectZone(i){
    const ring=document.getElementById('zrRing'); if(!ring)return;
    const nodes=ring.querySelectorAll('.zr-node'); const node=nodes[i]; if(!node)return;
    zrSel=i;
    nodes.forEach(n=>n.classList.remove('sel')); node.classList.add('sel');
    ring.querySelectorAll('#zrSpokes line').forEach(l=>l.classList.toggle('on',+l.dataset.i===i));
    const pc=+node.dataset.pc;
    document.getElementById('zrName').textContent=node.dataset.road;
    document.getElementById('zrRoadLbl').textContent='Zone '+(i+1)+' · approach checkpoint';
    const f=document.getElementById('zrFill'); f.style.width=pc+'%'; f.classList.toggle('hot',pc>=90);
    document.getElementById('zrPcLbl').textContent=pc+'% booked';
    document.getElementById('zrStatus').textContent=pc>=90?'⚠ near capacity → overflow armed':pc>=70?'filling steadily':'plenty of room';
    document.getElementById('zrMix').textContent=node.dataset.mix;
  }

  /* ---- Interactive: architecture network toggle ---- */
  function initArch(){
    const btn=document.getElementById('arToggle'); if(!btn||btn._init)return; btn._init=true;
    btn.addEventListener('click',()=>{
      const diag=document.getElementById('archDiag');
      const sev=diag.classList.toggle('severed');
      btn.classList.toggle('up',sev);
      btn.textContent=sev?'🔗 Restore the network':'✂ Cut the network';
      document.getElementById('arSyncLbl').textContent=sev?'no uplink — every gate runs on its own SQLite + public key':'syncs opportunistically — batched, not real-time';
      document.getElementById('arCaption').innerHTML=sev
        ?'The cloud is unreachable — yet every gate keeps admitting, denying and logging from its <b>local cache and on-device signature check</b>. Connectivity was only ever an optimisation.'
        :'Same trust model as a FASTag toll plaza or an airline boarding pass: transactions batch up and sync when a link appears. Nothing riskier than what NHAI already runs nationally.';
    });
  }
  function resetArch(){
    const diag=document.getElementById('archDiag'); const btn=document.getElementById('arToggle');
    if(!diag||!btn)return;
    diag.classList.remove('severed'); btn.classList.remove('up'); btn.textContent='✂ Cut the network';
    const l=document.getElementById('arSyncLbl'); if(l)l.textContent='syncs opportunistically — batched, not real-time';
    const cap=document.getElementById('arCaption'); if(cap)cap.innerHTML='Same trust model as a FASTag toll plaza or an airline boarding pass: transactions batch up and sync when a link appears. Nothing riskier than what NHAI already runs nationally.';
  }

  /* ---- Interactive: booking phone stepper ---- */
  function bkScreenHTML(step){
    const top=(app,h)=>'<div class="bk-top"><div class="bk-app">'+app+'</div><div class="bk-h">'+h+'</div></div>';
    const zrow=(name,pc,sel,hot)=>'<div class="row '+(sel?'pick':'')+'" style="flex-direction:column;align-items:stretch;gap:6px">'+
      '<div style="display:flex"><span>'+name+'</span><span style="margin-left:auto;font-weight:800;color:'+(hot?'#e11d48':sel?'#ea580c':'#64748b')+'">'+pc+'%'+(sel?' ✓':'')+'</span></div>'+
      '<div class="bk-mini"><i style="width:'+pc+'%'+(hot?';background:linear-gradient(90deg,#e11d48,#f97316)':'')+'"></i></div></div>';
    if(step===0) return top('Ujjain VMS · Book','Choose your event')+
      '<div class="bk-body bk-fade"><div class="row pick">🛕 Shahi Snan — 14 Jan 2028<span class="tick">✓</span></div>'+
      '<div class="row">🪔 Regular darshan — any day</div><div class="row">🚓 VIP movement window</div></div>';
    if(step===1) return top('Step 2 of 6','Pick your entry zone')+
      '<div class="bk-body bk-fade">'+zrow('Indore Road',92,false,true)+zrow('Dewas Road',78,false,false)+zrow('Unhel Road',54,true,false)+'</div>';
    if(step===2) return top('Step 3 of 6','Pick a time slot')+
      '<div class="bk-body bk-fade"><div class="bk-grid">'+
      '<div class="bk-slot full">06:00</div><div class="bk-slot">06:30</div><div class="bk-slot pick">07:00</div>'+
      '<div class="bk-slot">07:30</div><div class="bk-slot">08:00</div><div class="bk-slot">08:30</div></div>'+
      '<p style="font-size:12px;opacity:.7;margin-top:14px;text-align:center">30-minute arrival window · 07:00–07:30</p></div>';
    if(step===3) return top('Step 4 of 6','Vehicle &amp; number plate')+
      '<div class="bk-body bk-fade"><div class="bk-veh">'+
      '<div><span class="em">🏍️</span>2-Wheeler</div><div class="pick"><span class="em">🚗</span>Car</div><div><span class="em">🚌</span>Bus</div></div>'+
      '<div class="bk-plate">MP 09 CX 4412</div>'+
      '<p style="font-size:11.5px;opacity:.72;margin-top:11px;text-align:center;line-height:1.45">🔐 This plate is <b>signed into your QR</b> — a copied pass won\'t work on another vehicle.</p></div>';
    if(step===4) return top('Step 5 of 6','Pay via UPI')+
      '<div class="bk-body bk-fade" style="display:flex;flex-direction:column;justify-content:center">'+
      '<div class="bk-pay"><div style="font-size:12px;opacity:.7;font-weight:700">Amount payable</div><div class="amt">₹120</div>'+
      '<div style="font-size:12px;opacity:.7;margin-top:4px">Car · Unhel Road · 07:00 slot</div></div>'+
      '<button class="bk-paybtn" id="bkPay">Pay ₹120 via UPI</button></div>';
    return top('Your pass · ready','Show this at the gate')+
      '<div class="bk-body bk-fade" style="text-align:center">'+
      '<div style="font-size:12px;font-weight:800;color:#059669;margin-bottom:8px">✓ PAID · pass issued</div>'+
      '<div class="bk-qr" id="bkQr"></div>'+
      '<div class="bk-code">SMS fallback code<br><b>7K2 9QX</b></div></div>';
  }
  function fillQr(){
    const el=document.getElementById('bkQr'); if(!el)return;
    el.style.gridTemplateColumns='repeat(11,1fr)'; el.style.gridTemplateRows='repeat(11,1fr)';
    const n=11; const eye=(r,c)=>{
      const blocks=[[0,0],[0,n-3],[n-3,0]];
      for(const b of blocks){ if(r>=b[0]&&r<b[0]+3&&c>=b[1]&&c<b[1]+3){ return !((r-b[0])===1&&(c-b[1])===1);} }
      return null;
    };
    let h='',idx=0;
    for(let r=0;r<n;r++)for(let c=0;c<n;c++){
      const e=eye(r,c); const on=(e!==null)?e:((((r+1)*(c+3)*7919)%5)<2);
      h+='<i class="'+(on?'':'off')+'" style="animation-delay:'+(idx*4)+'ms"></i>'; idx++;
    }
    el.innerHTML=h;
  }
  let bkTimer=null;
  function stopBkPlay(){ if(bkTimer){clearTimeout(bkTimer);bkTimer=null;} const p=document.getElementById('bkPlay'); if(p)p.textContent='▶ Play the booking'; }
  function initBooking(){
    const wrap=document.getElementById('bkSteps'); if(!wrap||wrap._init)return; wrap._init=true;
    const btns=Array.from(wrap.querySelectorAll('.bk-step'));
    function setStep(s){
      btns.forEach((b,i)=>{b.classList.toggle('on',i===s);b.classList.toggle('done',i<s);});
      const scr=document.getElementById('bkScreen');
      scr.innerHTML='<div class="bk-notch"></div>'+bkScreenHTML(s);
      if(s===4){ const pb=document.getElementById('bkPay'); if(pb)pb.onclick=()=>{ pb.textContent='Paid ✓'; pb.classList.add('bk-payok'); setTimeout(()=>setStep(5),650); }; }
      if(s===5){ fillQr(); }
    }
    btns.forEach((b,i)=>b.addEventListener('click',()=>{stopBkPlay();setStep(i);}));
    document.getElementById('bkPlay').onclick=()=>{
      stopBkPlay(); const p=document.getElementById('bkPlay'); p.textContent='● Playing…';
      setStep(0); let s=0;
      function adv(){ s++; setStep(s); if(s<5){ bkTimer=setTimeout(adv, s===4?1500:1250); } else stopBkPlay(); }
      bkTimer=setTimeout(adv,1100);
    };
    document.getElementById('bkReset').onclick=()=>{ stopBkPlay(); setStep(0); };
    window._bkSetStep=setStep;
    setStep(0);
  }

  // rebind interactive widgets whenever they exist (they're in the DOM from start)
  bind(); bindCalc(); initZoneRing(); initArch(); initBooking();

  window.addEventListener('hashchange',()=>{ const n=parseInt(location.hash.slice(1),10); if(n>=1&&n<=slides.length)go(n-1); });
  const start=parseInt(location.hash.slice(1),10);
  go(start>=1&&start<=slides.length?start-1:0);
})();
</script>
</body>
